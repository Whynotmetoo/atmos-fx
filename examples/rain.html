<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atoms-fx weather smoke test</title>
    <link rel="stylesheet" href="../dist/atoms-fx.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 22% 18%, rgb(82 117 130 / 0.34), transparent 34%),
          linear-gradient(145deg, #111827, #0c111d 64%);
        color: #f8fafc;
      }

      #weather {
        width: min(920px, calc(100vw - 32px));
        min-height: min(620px, calc(100vh - 32px));
        padding: 32px;
        border: 1px solid rgb(255 255 255 / 0.16);
        background: linear-gradient(145deg, #182130, #0e1118 65%);
        box-shadow: 0 24px 80px rgb(0 0 0 / 0.42);
        transition:
          background 220ms ease,
          border-color 220ms ease;
      }

      #weather[data-demo-preset='snow'] {
        border-color: rgb(210 232 255 / 0.24);
        background: linear-gradient(145deg, #1f3340, #111827 62%, #16202b);
      }

      .panel {
        max-width: 420px;
        padding: 22px;
        border: 1px solid rgb(255 255 255 / 0.18);
        margin-top: 96px;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .preset-switch {
        margin-bottom: 24px;
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid rgb(255 255 255 / 0.14);
        border-radius: 999px;
        background: rgb(15 23 42 / 0.42);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: #f8fafc;
        color: #111827;
        font: inherit;
        font-weight: 650;
      }

      .preset-switch button {
        min-width: 72px;
        background: transparent;
        color: rgb(226 232 240 / 0.72);
      }

      .preset-switch button[aria-pressed='true'] {
        background: #f8fafc;
        color: #111827;
      }

      .meta {
        margin-top: 18px;
        font-size: 0.875rem;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 4.4rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: rgb(226 232 240 / 0.82);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main id="weather" data-demo-preset="storm">
      <div class="preset-switch" data-atoms-opaque role="group" aria-label="Weather preset">
        <button type="button" data-preset="rain">Rain</button>
        <button type="button" data-preset="storm" aria-pressed="true">Storm</button>
        <button type="button" data-preset="snow">Snow</button>
      </div>
      <section class="panel" data-atoms-collision>
        <h1 id="preset-title">Storm layer</h1>
        <p id="preset-summary">
          Fast rainfall uses the same DOM-aware engine with heavier density and wind.
        </p>
        <div class="actions">
          <button data-atoms-opaque>Opaque action</button>
          <span class="meta" data-atoms-opacity="0.62">Custom opacity label</span>
        </div>
      </section>
    </main>
    <script type="module">
      import { createAtmosphere } from '../dist/index.js'

      const root = document.querySelector('#weather')
      const title = document.querySelector('#preset-title')
      const summary = document.querySelector('#preset-summary')
      const presetButtons = Array.from(document.querySelectorAll('[data-preset]'))
      const presets = {
        rain: {
          options: {
            preset: 'rain',
            density: 0.72,
            speed: 1,
            wind: -0.12,
            color: 'rgba(220, 235, 255, 0.72)',
          },
          title: 'Rain layer',
          summary: 'This page smoke-tests layered rain, glass controls, and card-edge splashes.',
        },
        storm: {
          options: {
            preset: 'storm',
            density: 0.9,
            speed: 1.25,
            wind: -0.28,
            color: 'rgba(210, 228, 255, 0.8)',
          },
          title: 'Storm layer',
          summary: 'Fast rainfall uses the same DOM-aware engine with heavier density and wind.',
        },
        snow: {
          options: {
            preset: 'snow',
            density: 0.58,
            speed: 0.42,
            wind: 0.16,
            color: 'rgba(245, 250, 255, 0.86)',
          },
          title: 'Snow layer',
          summary: 'Snow switches to drifting flakes while preserving the glass and opaque controls.',
        },
      }
      const atmosphere = createAtmosphere(root, {
        preset: 'storm',
        density: 0.9,
        quality: 'high',
        wind: -0.28,
      })

      function setPreset(name) {
        const preset = presets[name]
        root.dataset.demoPreset = name
        title.textContent = preset.title
        summary.textContent = preset.summary
        atmosphere.update({
          ...preset.options,
          quality: 'high',
        })

        for (const button of presetButtons) {
          button.setAttribute('aria-pressed', String(button.dataset.preset === name))
        }
      }

      for (const button of presetButtons) {
        button.addEventListener('click', () => {
          setPreset(button.dataset.preset)
        })
      }

      atmosphere.start()
      window.atomsFxSmoke = atmosphere
    </script>
  </body>
</html>
