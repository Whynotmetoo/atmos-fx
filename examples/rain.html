<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atoms-fx rain smoke test</title>
    <link rel="stylesheet" href="../dist/atoms-fx.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f8fafc;
      }

      #weather {
        width: min(920px, calc(100vw - 32px));
        min-height: min(620px, calc(100vh - 32px));
        padding: 32px;
        border: 1px solid rgb(255 255 255 / 0.16);
        background: linear-gradient(145deg, #182130, #0e1118 65%);
        box-shadow: 0 24px 80px rgb(0 0 0 / 0.42);
      }

      .panel {
        max-width: 420px;
        padding: 22px;
        border: 1px solid rgb(255 255 255 / 0.18);
      }

      .actions {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: #f8fafc;
        color: #111827;
        font: inherit;
        font-weight: 650;
      }

      .meta {
        margin-top: 18px;
        font-size: 0.875rem;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 4.4rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: rgb(226 232 240 / 0.82);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main id="weather">
      <section class="panel">
        <h1>Rain layer</h1>
        <p>
          This page smoke-tests the Canvas 2D rain renderer against the built package output.
        </p>
        <div class="actions">
          <button data-atoms-opaque>Opaque action</button>
          <span class="meta" data-atoms-opacity="0.62">Custom opacity label</span>
        </div>
      </section>
    </main>
    <script type="module">
      import { createAtmosphere } from '../dist/index.js'

      const root = document.querySelector('#weather')
      const atmosphere = createAtmosphere(root, {
        preset: 'storm',
        density: 0.9,
        quality: 'high',
        wind: -0.22,
      })

      atmosphere.start()
      window.atomsFxSmoke = atmosphere
    </script>
  </body>
</html>
