<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atoms-fx React smoke test</title>
    <link rel="stylesheet" href="../dist/atoms-fx.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          "Avenir Next", "SF Pro Display", ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(120deg, rgb(5 18 24 / 0.92), rgb(24 28 42 / 0.92)),
          repeating-linear-gradient(
            90deg,
            rgb(255 255 255 / 0.025) 0,
            rgb(255 255 255 / 0.025) 1px,
            transparent 1px,
            transparent 80px
          );
        color: #f8fafc;
      }

      #root {
        min-height: 100vh;
      }

      .react-weather-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        align-items: end;
        padding: clamp(20px, 4vw, 48px);
        box-sizing: border-box;
        background:
          linear-gradient(180deg, rgb(23 54 70 / 0.68), transparent 52%),
          linear-gradient(135deg, #0f2f36 0%, #172033 44%, #101219 100%);
      }

      .forecast-panel {
        width: min(760px, 100%);
        border: 1px solid rgb(255 255 255 / 0.18);
        border-radius: 8px;
        padding: clamp(20px, 4vw, 34px);
      }

      .forecast-kicker {
        margin: 0 0 12px;
        color: #f7c873;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .forecast-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: clamp(18px, 4vw, 42px);
        align-items: end;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 13vw, 8.5rem);
        line-height: 0.84;
        letter-spacing: 0;
      }

      .summary {
        margin: 16px 0 0;
        max-width: 32rem;
        color: rgb(226 232 240 / 0.82);
        font-size: clamp(1rem, 2vw, 1.18rem);
        line-height: 1.55;
      }

      .temperature {
        display: grid;
        justify-items: end;
        gap: 8px;
      }

      .temperature strong {
        font-size: clamp(3rem, 9vw, 6.5rem);
        line-height: 0.9;
      }

      .temperature span {
        color: rgb(226 232 240 / 0.74);
        font-weight: 700;
      }

      .action-row {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 999px;
        padding: 0 16px;
        background: #f8fafc;
        color: #111827;
        font: inherit;
        font-weight: 800;
      }

      .reading {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        border: 1px solid rgb(255 255 255 / 0.16);
        border-radius: 999px;
        padding: 0 14px;
        color: rgb(226 232 240 / 0.82);
        font-weight: 750;
      }

      @media (max-width: 680px) {
        .forecast-grid {
          grid-template-columns: 1fr;
        }

        .temperature {
          justify-items: start;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React from 'react'
      import { createRoot } from 'react-dom/client'
      import { Atmosphere } from '../dist/react.js'

      function App() {
        return React.createElement(
          Atmosphere,
          {
            className: 'react-weather-shell',
            preset: 'storm',
            density: 0.82,
            wind: -0.24,
            quality: 'high',
            pauseWhenHidden: false,
          },
          React.createElement(
            'section',
            { className: 'forecast-panel', 'data-atoms-collision': true },
            React.createElement('p', { className: 'forecast-kicker' }, 'Lakefront station'),
            React.createElement(
              'div',
              { className: 'forecast-grid' },
              React.createElement(
                'div',
                null,
                React.createElement('h1', null, 'Hard rain'),
                React.createElement(
                  'p',
                  { className: 'summary' },
                  'Heavy bands moving through after midnight with sharp gusts and fast surface runoff.',
                ),
              ),
              React.createElement(
                'div',
                { className: 'temperature' },
                React.createElement('strong', null, '48'),
                React.createElement('span', null, 'feels like 42'),
              ),
            ),
            React.createElement(
              'div',
              { className: 'action-row' },
              React.createElement('button', { 'data-atoms-opaque': true }, 'Open radar'),
              React.createElement(
                'span',
                { className: 'reading', 'data-atoms-opacity': '0.68' },
                'Wind 24 mph',
              ),
            ),
          ),
        )
      }

      createRoot(document.querySelector('#root')).render(React.createElement(App))
      window.atomsFxReactSmoke = true
    </script>
  </body>
</html>
